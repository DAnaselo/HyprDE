#!/usr/bin/env bash

PRESET_DIR="$HOME/.config/MangoHud/presets"
TARGET="$HOME/.config/MangoHud/MangoHud.conf"

# Create preset dir if missing
mkdir -p "$PRESET_DIR"

# Get list of .conf files
OPTIONS=$(find "$PRESET_DIR" -maxdepth 1 -type f -name "*.conf" -printf "%f\n" | sort)

# Exit if none found
[ -z "$OPTIONS" ] && notify-send "MangoHud Swapper" "No preset configs found." && exit 1

# Current active config (if symlink)
CURRENT=$(basename "$(readlink -f "$TARGET" 2>/dev/null)")

# Launch rofi
CHOICE=$(echo "$OPTIONS" | rofi -dmenu -i -p "MangoHud Preset" -mesg "Current: $CURRENT")

[ -z "$CHOICE" ] && exit 0

# Switch config (symlink method)
ln -sf "$PRESET_DIR/$CHOICE" "$TARGET"

notify-send "MangoHud Swapper" "Switched to: $CHOICE"
